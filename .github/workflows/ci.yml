name: CI & Publish

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # 1. Job de Integración Continua (Pruebas y Build)
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]

    steps:
      - name: 📥 Clonar Repositorio
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 📦 Instalar Dependencias
        run: npm ci

      - name: 🔍 Verificación de Tipos con TypeScript (tsc)
        run: npm run build:cli

      - name: 🧪 Validar Manifiesto de Prueba (`validate`)
        run: npx ts-node bin/fullstack_ecosystem.ts validate examples/app.yaml

      - name: 🔨 Probar Compilación a carpeta `/dist` (`build`)
        run: npx ts-node bin/fullstack_ecosystem.ts build examples/app.yaml

  # 2. Job de Publicación a npmjs (Solo se ejecuta en 'main' o 'master' si pasan los tests)
  publish-to-npm:
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    environment: npmjs
    permissions:
      contents: read
      id-token: write

    steps:
      - name: 📥 Clonar Repositorio
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: 📦 Instalar Dependencias
        run: npm ci

      - name: 🏗️ Compilar Proyecto
        run: npm run build:cli

      - name: 🚀 Publicar en npmjs (@jorge.torrelles/fullstack-ecosystem)
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}