name: CI (Integration & Build Check)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: 📥 Clonar Repositorio
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 📦 Instalar Dependencias
        run: npm ci

      - name: 🔍 Verificación de Tipos con TypeScript (tsc)
        run: npm run build:cli

      - name: 🧪 Validar Manifiesto de Prueba (`validate`)
        run: npx ts-node bin/mystack.ts validate examples/app.yaml

      - name: 🔨 Probar Compilación a carpeta `/dist` (`build`)
        run: npx ts-node bin/mystack.ts build examples/app.yaml