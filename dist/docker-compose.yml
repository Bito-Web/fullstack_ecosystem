# Generado automáticamente por Mystack CLI
version: '3.8'

services:

  server:
    image: nginx:1.24
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./server/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./front:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    networks:
      - app-network

  database:
    image: postgresql:16.0
    ports:
      - "5432:5432"
    env_file:
      - .env
    networks:
      - app-network

networks:
  app-network:
    driver: bridge